function renderStart() {

  card.innerHTML = `

    <button class="start-btn" onclick="startQuiz()">はじめる ✨</button>
  `;
}

function startQuiz() {
  current = 0;
  renderQuestion();
}

function renderQuestion() {
  const q = questions[current];
  const card = document.getElementById('card');
  document.getElementById('progressBar').style.width = `${(current / questions.length) * 100}%`;
  card.innerHTML = `
    <div class="q-number">Q${current + 1} / ${questions.length}</div>
    <div class="q-text">${q.text}</div>
    <div id="options"></div>
    ${current > 0 ? '<div class="nav-row"><button class="back-link" onclick="goBack()">← 前の質問へ</button></div>' : ''}
  `;
  const optWrap = document.getElementById('options');
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt.label;
    btn.onclick = () => selectAnswer(q.key, opt.value);
    optWrap.appendChild(btn);
  });
}

function selectAnswer(key, value) {
  answers[key] = value;
  if (current < questions.length - 1) {
    current++;
    renderQuestion();
  } else {
    document.getElementById('progressBar').style.width = '100%';

}

function goBack() {
  if (current > 0) { current--; renderQuestion(); }
}

function computeType() {
  const comfort = (answers.usage ?? 0) + (answers.feeling ?? 0);
  if (comfort <= 1) return "A";
  if (comfort >= 5) return "E";
  switch (answers.domain) {
    case "office": return "B";
    case "creative": return "C";
    case "people":
    case "specialist": return "D";
    case "management": return "F";
    default: return "B";
  }
}

    microsoft: "Microsoft Formsで集めた回答は、Copilotに読み込ませると自由記述のコメントも分類・要約してくれます。",
    common: "質問文づくり自体もClaudeやChatGPTに相談すると、回答が集まりやすい聞き方に整えてもらえます。自由記述の分析はClaudeが得意です。"
  }
};

const promptExamples = {
  doc: "【ステップ1：骨子だけ】\n「以下の情報をもとに、資料の見出し構成だけ3パターン考えてください。本文はまだ書かなくていいです。\n情報：〇〇」\n\n【ステップ2：肉付け】\n「①番の構成で、各見出しに300字程度の本文を追加してください。トーンは丁寧語でお願いします」",
  research: "「〇〇について、要点を5つにまとめてください。専門用語は避けて、初めて聞く人にもわかるように説明してください」",
  comm: "「以下のメール(または状況)に対する返信を、丁寧だけど堅すぎないトーンで3パターン作ってください。\n〇〇(状況を貼る)」",
  meeting: "「以下は会議の文字起こしです。①決まったこと②誰が何をいつまでにやるか③次回までの宿題、の3つに分けて整理してください。\n〇〇(文字起こしを貼る)」",
  sns: "「〇〇(商品・サービス名)のSNS投稿用キャプションを、親しみやすいトーンで3パターン作ってください。最後にハッシュタグも5つ提案してください」",
  data: "「このデータ(表を貼る)から、傾向を3つ読み取って、専門知識がない人にもわかる言葉で説明してください」",
  survey: "「このアンケートの自由記述回答(貼る)を、似た意見ごとにグループ分けして、それぞれの件数と代表的な意見を1つずつ教えてください」"
};

function comboNote() {
  const c = comboMap[answers.priority];
  if (!c) return '';
  let platformText = '';
  if (answers.platform === 'google' && c.google) platformText = c.google;
  else if (answers.platform === 'microsoft' && c.microsoft) platformText = c.microsoft;
  else if (answers.platform === 'both') platformText = [c.google, c.microsoft].filter(Boolean).join(' ');
  const tags = [];
  if (answers.platform === 'google' || answers.platform === 'both') tags.push('Gemini');
  if (answers.platform === 'microsoft' || answers.platform === 'both') tags.push('Copilot');
  tags.push('Claude', 'ChatGPT');
  return `<span class="tool-tag">${tags.join('</span><span class="tool-tag">')}</span><div class="section-text" style="margin-top:10px;">${platformText} ${c.common}</div>`;
}

function permissionNote() {
  switch (answers.permission) {
    case "free": return "会社でも自由に使えるとのことなので、そのまま仕事の資料作成にも取り入れてみてください。";
    case "personal_only": return "会社ではNGとのことなので、まずは個人のスマホ・PCで、仕事以外の場面から試すのがおすすめです。";
    case "unsure": return "ルールが曖昧なときは、まず個人利用の範囲(調べ物・学習目的)から始めると安心です。会社のルールは一度総務や上司に確認してみてもいいかもしれません。";
    case "restricted": return "職場での利用が難しい環境とのことなので、プライベートの時間で「自分のためのAI活用」から始めてみましょう。";
    default: return "";
  }
}

function renderResult() {
  const type = computeType();
  const r = resultTypes[type];
  const card = document.getElementById('card');
  card.innerHTML = `
    <div class="result-badge">診断結果</div>
    ${mascot("結果が出ました！あなたにぴったりの使い方、見ていきましょう✨", 56)}
    <div class="result-name">${r.name}</div>
    <div class="result-catch">${r.catch}</div>

    <div class="section-block">
      <div class="section-label">✓ あなたの強み</div>
      <div class="section-text">${r.strength}</div>
    </div>

    <div class="section-block">
      <div class="section-label">◎ ここを伸ばすともっと良くなる点</div>
      <div class="section-text">${r.growth}</div>
    </div>

    <div class="section-block">
      <div class="section-label">あなたに合うAIの活かし方</div>
      <div class="section-text">${r.tools.map(t => `<span class="tool-tag">${t}</span>`).join('')}</div>
      <div class="section-text" style="margin-top:10px;">${permissionNote()}</div>
    </div>

    <div class="section-block">
      <div class="section-label">その「時間がかかっている業務」、こう掛け合わせるとラクになります</div>
      <div class="section-text">${comboNote()}</div>
    </div>

    <div class="section-block">
      <div class="section-label">📋 今日から使えるコピペ用プロンプト</div>
      <div class="prompt-box">${promptExamples[answers.priority] || ''}</div>
      <button class="copy-btn" id="copyBtn" onclick="copyPrompt()">このプロンプトをコピー</button>
    </div>

    <div class="section-block">
      <div class="section-label">🤝 AIを「秘書」にする3つのコツ</div>
      <div class="section-text">
        <b>①いつも同じ指示は覚えさせる</b>：「メールはこのトーンで」「資料はこの形式で」など、繰り返す指示はカスタム指示やメモリ機能に登録しておくと、毎回説明する手間がなくなります。<br><br>
        <b>②背景情報を渡す</b>：優秀な秘書ほど「察して」動けるのは、事情を知っているから。AIも同じで、状況や目的を先に伝えるほど的確な提案が返ってきます。<br><br>
        <b>③丸投げせず、最終判断は自分でする</b>：秘書は代わりに動いてくれますが、決めるのはあなた自身。AIの提案はたたき台として使うのが安全です。
      </div>
    </div>

    <div class="section-block">
      <div class="section-label">📈 マスターしていくロードマップ</div>
      <div class="roadmap-row">
        <div class="roadmap-item">
          <div class="roadmap-lv">Lv1</div>
          <div class="roadmap-text"><b>まずはここから</b>：ChatGPT・Claude・Geminiのどれか1つに、今日の悩みごとを話しかけてみる。</div>
        </div>
        <div class="roadmap-item">
          <div class="roadmap-lv">Lv2</div>
          <div class="roadmap-text"><b>慣れてきたら</b>：定型業務をテンプレ化し、同じ指示を毎回使い回す。資料作成ならCanvaと組み合わせる。</div>
        </div>
        <div class="roadmap-item">
          <div class="roadmap-lv">Lv3</div>
          <div class="roadmap-text"><b>マスターレベル</b>：Claude(相談・下書き)、Claude Cowork(資料横断・複数アプリ連携)、Claude Code(繰り返す作業の自動化)を使い分けて、仕組みそのものを作る。</div>
        </div>
      </div>
    </div>

    <div class="section-block">
      <div class="section-label">今日からできる一歩</div>
      <div class="section-text">${r.action}</div>
    </div>

    <button class="primary-btn" onclick="renderStart()" style="margin-top:8px;">もう一度診断する</button>
    <div class="footer-note">この診断は、あなたに合うAIとの付き合い方を見つけるためのきっかけです。<br>もっと自分に合う使い方を知りたい方は、まゆまでお気軽に🌸</div>
  `;
}

renderStart();
</script>
</body>
